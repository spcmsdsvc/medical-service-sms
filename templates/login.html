<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function(){
        let saved = null;
        try { saved = JSON.parse(localStorage.getItem('medical_appearance_last') || 'null'); } catch (_) {}
        const mode = saved && ['light','dark','system'].includes(saved.mode) ? saved.mode : 'light';
        const accent = saved && ['classic','shimadzu-red','clinical-green','corporate-blue'].includes(saved.accent) ? saved.accent : 'classic';
        const effective = mode === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : (mode === 'system' ? 'light' : mode);
        document.documentElement.dataset.appTheme = effective;
        document.documentElement.dataset.bsTheme = effective;
        document.documentElement.dataset.accentTheme = accent;
    })();
    </script>
    <title>Login - MEDICAL SERVICE</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-themes.css') }}?v=16">
    <style>
        :root {
            --login-primary: #d63384;
            --login-dark: #0f172a;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
        }

        body { 
            background:
                radial-gradient(circle at top left, rgba(214, 51, 132, 0.18), transparent 35%),
                linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding:
                max(20px, env(safe-area-inset-top))
                18px
                max(20px, env(safe-area-inset-bottom))
                18px;
            overflow-x: hidden;
        }

        .login-shell {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card { 
            width: 100%;
            max-width: 420px; 
            padding: 40px; 
            background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.45); 
            animation: loginFade 0.35s ease;
        }

        @keyframes loginFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 3.2rem;
            color: var(--login-primary); 
            margin-bottom: 12px;
        }

        .form-label {
            letter-spacing: 0.04em;
        }

        .form-control,
        .input-group-text {
            min-height: 50px;
            border-radius: 14px;
        }

        .form-control {
            font-size: 0.95rem;
            font-weight: 700;
            border-left: 0 !important;
        }

        .input-group-text {
            background-color: #f8fafc;
            border-right: 0 !important;
            padding-left: 16px;
            padding-right: 14px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--login-primary);
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--login-primary);
        }

        .btn-primary {
            min-height: 52px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #d63384 0%, #0d6efd 100%);
            font-size: 0.92rem;
            letter-spacing: 0.03em;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            transform: translateY(-1px);
            opacity: 0.96;
        }

        .alert {
            border-radius: 14px;
        }

        @media (max-width: 768px) {
            body {
                align-items: stretch;
            }

            .login-shell {
                align-items: center;
                min-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            }

            .login-card {
                max-width: 100%;
                padding: 26px 22px;
                border-radius: 22px;
            }

            .logo-icon {
                font-size: 2.7rem;
            }

            h2 {
                font-size: 1.45rem;
            }

            .form-control,
            .input-group-text {
                min-height: 54px;
            }

            .btn-primary {
                min-height: 54px;
                font-size: 0.95rem;
            }

            .input-group {
                box-shadow: none !important;
            }
        }

        @media (max-width: 420px) {
            body {
                padding-left: 14px;
                padding-right: 14px;
            }

            .login-card {
                padding: 22px 18px;
            }

            .logo-icon {
                font-size: 2.4rem;
            }

            h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-shell">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-house-medical logo-icon"></i>
            <h2 class="fw-bold text-dark mb-0">MEDICAL SERVICE</h2>
            <p class="text-muted small">Scheduler & Management System</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger d-flex align-items-center small py-2" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>
                    <div>{{ messages[0] }}</div>
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <!-- NEW SECURITY TOKEN FOR HIERARCHY -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">USERNAME</label>
                <div class="input-group shadow-sm">
                    <span class="input-group-text border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <div class="input-group shadow-sm">
                    <span class="input-group-text border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm mb-3">
                SIGN IN <i class="fa-solid fa-right-to-bracket ms-1"></i>
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-muted" style="font-size: 0.7rem;">&copy; 2026 MEDICAL SERVICE. All Rights Reserved.</p>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
